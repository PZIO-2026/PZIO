name: pytest

on:
    push:
    pull_request:
        branches: [master]

jobs:
    test-backend:
        name: Run pytest on backend (${{ matrix.test-db }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                test-db: [sqlite, postgres]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -e backend

            - name: Run tests and publish summary
              env:
                  PZIO_TEST_DB: ${{ matrix.test-db }}
              run: |
                  set +e
                  set -o pipefail
                  pytest backend --cov=pzio --cov-report term-missing:skip-covered | tee pytest_output.txt
                  rc=$?
                  echo '## Pytest Output (${{ matrix.test-db }})' >> $GITHUB_STEP_SUMMARY
                  echo '```' >> $GITHUB_STEP_SUMMARY
                  cat pytest_output.txt >> $GITHUB_STEP_SUMMARY
                  echo '```' >> $GITHUB_STEP_SUMMARY
                  exit $rc
